spring:
  application:
    name: my-bank-front-app
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: my-bank-front-app
            client-secret: frontend-secret
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8083/login/oauth2/code/keycloak
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/bank-app-realm
            user-name-attribute: preferred_username
  cloud:
    consul:
      host: 127.0.0.1
      port: 8500
      discovery:
        enabled: true
        register: true
        health-check-path: /actuator/health
        instance-id: ${spring.application.name}:${random.value}
        hostname: ${spring.application.name}
        service-name: my-bank-front-app
      config:
        enabled: true            # ???????? Consul Config ??? ??????? ????????????
        prefix: config           # ??????? ? KV-????????? Consul (?? ????????? "config")
        defaultContext: application  # ???????? ?? ?????????
  config:
    import: "optional:consul:${spring.cloud.consul.host}:${spring.cloud.consul.port}"