server:
  port: 8080 #  фронтенд

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      default-filters:
        - TokenRelay
      routes:
        # Accounts
        - id: accounts-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/accounts/**

        # Notifications
        - id: notifications-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/notifications/**

        # Transfer
        - id: transfer-route
          uri: http://localhost:8083
          predicates:
            - Path=/transfer/**

        # Cash
        - id: cash-route
          uri: http://localhost:8084
          predicates:
            - Path=/cash/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/my-bank-app