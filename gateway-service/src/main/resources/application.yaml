server:
  port: 8080 #  фронтенд

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      default-filters:
        - TokenRelay
      routes:
        # Accounts
        - id: accounts-route
          uri: http://accounts-service:8081 # Имя из docker-compose
          predicates:
            - Path=/api/accounts/**

        # Notifications
        - id: notifications-route
          uri: http://notifications-service:8082
          predicates:
            - Path=/api/notifications/**

        # Transfer
        - id: transfer-route
          uri: http://transfer-service:8083
          predicates:
            - Path=/transfer/**

        # Cash
        - id: cash-route
          uri: http://cash-service:8084
          predicates:
            - Path=/cash/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/my-bank-app
      client:
        provider:
          keycloak:
            issuer-uri: http://keycloak:8080/realms/my-bank-app