spring:
  application:
    name: accounts-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 10
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
  cloud:
    consul:
      host: ${SPRING_CLOUD_CONSUL_HOST:localhost}
      port: 8500
      discovery:
        service-name: accounts-service
        enabled: true
        register: true
        health-check-path: /actuator/health
        health-check-interval: 10s
        prefer-ip-address: false
        instance-id: ${spring.application.name}:${random.value}
        hostname: ${spring.application.name}
      config:
        enabled: true
        prefix: config
        defaultContext: application
  config:
    # optional: если Consul недоступен, используются локальные defaults
    import: "optional:consul:${spring.cloud.consul.host}:${spring.cloud.consul.port}"
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # keycloak.jwk-set-uri поставляется Consul Config (config/application/)
          jwk-set-uri: ${keycloak.jwk-set-uri:http://localhost:8080/realms/bank-app-realm/protocol/openid-connect/certs}
      client:
        registration:
          accounts-service-client:
            provider: keycloak
            client-id: accounts-service-client
            client-secret: ${CLIENT_SECRET}
            authorization-grant-type: client_credentials
            scope: openid, profile
        provider:
          keycloak:
            token-uri: ${keycloak.token-uri:http://localhost:8080/realms/bank-app-realm/protocol/openid-connect/token}

app:
  kafka:
    topics:
      notifications: ${KAFKA_NOTIFICATIONS_TOPIC:notifications.events}

services:
  notifications-url: ${NOTIFICATIONS_SERVICE_URL:http://notifications-service:8082}

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always


resilience4j:
  circuitbreaker:
    instances:
      notificationsService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
  retry:
    instances:
      notificationsService:
        maxAttempts: 3
        waitDuration: 500ms