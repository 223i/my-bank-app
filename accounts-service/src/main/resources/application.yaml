spring:
  application:
    name: accounts-service
  cloud:
    consul:
      host: ${SPRING_CLOUD_CONSUL_HOST:localhost}
      port: 8500
      discovery:
        service-name: accounts-service
        enabled: true
        register: true
        health-check-path: /actuator/health
        health-check-interval: 10s
        prefer-ip-address: false
        instance-id: ${spring.application.name}:${random.value}
        hostname: ${spring.application.name}
      config:
        enabled: true
        prefix: config
        defaultContext: application
  config:
    import: "optional:consul:${spring.cloud.consul.host}:${spring.cloud.consul.port}"
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8080/realms/bank-app-realm}
#      client:
#        registration:
#          notifications-client:
#            provider: keycloak
#            client-id: accounts-service-client
#            client-secret: ${CLIENT_SECRET}
#            authorization-grant-type: client_credentials
#            scope: openid, profile
#        provider:
#          keycloak:
#            issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8080/realms/bank-app-realm}

server:
  port: ${SERVER_PORT:8081}

notifications:
  service:
    url: http://notifications-service:8082

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
