spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
logging.level.com.iron=DEBUG

# OAuth2 Test Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://test-issuer
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://test-issuer/.well-known/jwks.json

# Disable OAuth2 client in tests
spring.security.oauth2.client.enabled=false
