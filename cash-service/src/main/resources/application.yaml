spring:
  application:
    name: cash-service
  cloud:
    consul:
      host: ${SPRING_CLOUD_CONSUL_HOST:localhost}
      port: 8500
      discovery:
        service-name: cash-service
        enabled: true
        register: true
        health-check-path: /actuator/health
        health-check-interval: 10s
      config:
        enabled: true
        prefix: config
        defaultContext: application
  config:
    import: "optional:consul:${spring.cloud.consul.host}:${spring.cloud.consul.port}"
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  security:
    oauth2:
      client:
        registration:
          cash-service-client:
            provider: keycloak
            client-id: cash-service-client
            client-secret: ${CASH_CLIENT_SECRET}
            authorization-grant-type: client_credentials
            scope: openid, profile
        provider:
          keycloak:
            token-uri: ${keycloak.token-uri:http://localhost:8080/realms/bank-app-realm/protocol/openid-connect/token}
      resourceserver:
        jwt:
          jwk-set-uri: ${keycloak.jwk-set-uri:http://localhost:8080/realms/bank-app-realm/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always