# Source: my-bank-app/charts/common-db/templates/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: common-db
spec:
  serviceName: "common-db"
  replicas: 1
  selector:
    matchLabels:
      app: common-db
  template:
    metadata:
      labels:
        app: common-db
    spec:
      containers:
        - name: postgres
          image: "postgres:16"
          env:
            - name: POSTGRES_DB
              value: "users"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bank-secrets
                  key: db-password
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pg-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 1Gi
