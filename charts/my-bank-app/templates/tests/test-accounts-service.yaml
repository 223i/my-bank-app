apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-accounts-service-test"
  labels:
    app: "{{ .Release.Name }}-accounts-service-test"
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-accounts-service
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Testing accounts-service health..."
          # Wait for service to be ready
          for i in $(seq 1 30); do
            if wget -q --spider http://accounts-service:8081/actuator/health; then
              echo "accounts-service is healthy!"
              exit 0
            fi
            echo "Attempt $i: accounts-service not ready, waiting..."
            sleep 5
          done
          echo "accounts-service health check failed after 30 attempts"
          exit 1
