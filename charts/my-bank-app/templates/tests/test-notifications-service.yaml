apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-notifications-service-test"
  labels:
    app: "{{ .Release.Name }}-notifications-service-test"
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-notifications-service
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Testing notifications-service health..."
          # Wait for service to be ready
          for i in $(seq 1 30); do
            if wget -q --spider http://notifications-service:8082/actuator/health; then
              echo "notifications-service is healthy!"
              exit 0
            fi
            echo "Attempt $i: notifications-service not ready, waiting..."
            sleep 5
          done
          echo "notifications-service health check failed after 30 attempts"
          exit 1
