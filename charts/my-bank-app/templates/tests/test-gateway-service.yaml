apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-gateway-service-test"
  labels:
    app: "{{ .Release.Name }}-gateway-service-test"
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-gateway-service
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Testing gateway-service health..."
          # Wait for service to be ready
          for i in $(seq 1 30); do
            if wget -q --spider http://gateway-service:8000/actuator/health; then
              echo "gateway-service is healthy!"
              exit 0
            fi
            echo "Attempt $i: gateway-service not ready, waiting..."
            sleep 5
          done
          echo "gateway-service health check failed after 30 attempts"
          exit 1
