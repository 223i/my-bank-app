apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-cash-service-test"
  labels:
    app: "{{ .Release.Name }}-cash-service-test"
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "4"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-cash-service
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Testing cash-service health..."
          # Wait for service to be ready
          for i in $(seq 1 30); do
            if wget -q --spider http://cash-service:8084/actuator/health; then
              echo "cash-service is healthy!"
              exit 0
            fi
            echo "Attempt $i: cash-service not ready, waiting..."
            sleep 5
          done
          echo "cash-service health check failed after 30 attempts"
          exit 1
