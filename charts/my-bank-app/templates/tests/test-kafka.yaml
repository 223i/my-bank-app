apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-kafka-test"
  labels:
    app: "{{ .Release.Name }}-kafka-test"
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-kafka
      image: docker.io/bitnamilegacy/kafka:4.0.0-debian-12-r10
      command:
        - sh
        - -c
        - |
          echo "Testing Kafka broker availability..."
          for i in $(seq 1 30); do
            if kafka-topics.sh --bootstrap-server my-bank-app-kafka:9092 --list >/tmp/topics.txt 2>/tmp/kafka.err; then
              echo "Kafka broker is reachable"
              break
            fi
            echo "Attempt $i: Kafka not ready yet"
            cat /tmp/kafka.err || true
            sleep 5
          done

          if ! kafka-topics.sh --bootstrap-server my-bank-app-kafka:9092 --list >/tmp/topics.txt 2>/tmp/kafka.err; then
            echo "Kafka broker is not reachable after 30 attempts"
            cat /tmp/kafka.err || true
            exit 1
          fi

          if ! grep -q '^notifications\.events$' /tmp/topics.txt; then
            echo "Expected topic notifications.events not found"
            cat /tmp/topics.txt
            exit 1
          fi

          echo "Kafka topic notifications.events is available"
          exit 0
