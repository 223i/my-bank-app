apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-keycloak-test"
  labels:
    app: "{{ .Release.Name }}-keycloak-test"
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "6"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-keycloak
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Testing Keycloak health..."
          # Wait for Keycloak to be ready
          for i in $(seq 1 60); do
            if wget -q --spider http://keycloak:8080/realms/master; then
              echo "Keycloak is healthy!"
              # Test realm availability
              if wget -q --spider http://keycloak:8080/realms/bank-app-realm; then
                echo "bank-app-realm is available!"
                exit 0
              else
                echo "Keycloak is up but realm not available"
                exit 1
              fi
            fi
            echo "Attempt $i: Keycloak not ready, waiting..."
            sleep 10
          done
          echo "Keycloak health check failed after 60 attempts"
          exit 1
