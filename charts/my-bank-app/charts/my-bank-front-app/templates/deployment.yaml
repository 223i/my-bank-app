apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-bank-front-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: my-bank-front-app
  template:
    metadata:
      labels:
        app: my-bank-front-app
    spec:
      containers:
        - name: my-bank-front-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: SERVER_PORT
              value: {{ .Values.env.server_port | quote }}
            - name: FRONTEND_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bank-secrets
                  key: frontend-client-secret
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}