apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: front-app-service-reader
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: front-app-service-reader-binding
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: front-app-service-reader
  apiGroup: rbac.authorization.k8s.io